services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  airflow:
    build: .
    depends_on: [postgres, statsd-exporter]
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      AIRFLOW__SCHEDULER__STATSD_ON: "True"
      AIRFLOW__SCHEDULER__STATSD_HOST: statsd-exporter
      AIRFLOW__SCHEDULER__STATSD_PORT: "8125"
      AIRFLOW__SCHEDULER__STATSD_PREFIX: airflow
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./dbt_project:/opt/airflow/dbt_project
    command: standalone

  # --- StatsD exporter: translates Airflow metrics → Prometheus format
  statsd-exporter:
    image: prom/statsd-exporter:latest
    ports:
      - "9102:9102" # Prometheus scrapes this
      - "8125:8125/udp" # Airflow sends metrics here
    volumes:
      - ./monitoring/statsd_mapping.yml:/tmp/statsd_mapping.yml
    command: --statsd.mapping-config=/tmp/statsd_mapping.yml

  # --- PostgreSQL exporter: exposes DB metrics to Prometheus
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://pipeline_user:pipeline_pass@postgres:5432/ecommerce?sslmode=disable"
    depends_on: [postgres]

  # --- Prometheus: collects and stores all metrics
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"

  # --- Grafana: visualizes all metrics in dashboards
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000" # 3000 is taken by Metabase, so we use 3001
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on: [prometheus]

  metabase:
    image: metabase/metabase:latest
    ports:
      - "3000:3000"
    depends_on: [postgres]

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
