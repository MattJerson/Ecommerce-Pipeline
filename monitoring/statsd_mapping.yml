mappings:
  # --- Airflow task metrics
  - match: "airflow.ti.finish.*.*.*"
    name: "airflow_task_finish_total"
    labels:
      dag_id: "$1"
      task_id: "$2"
      state: "$3"

  - match: "airflow.dag.*.*.duration"
    name: "airflow_dag_duration_seconds"
    labels:
      dag_id: "$1"
      run_id: "$2"

  - match: "airflow.dag_processing.total_parse_time"
    name: "airflow_dag_parse_time_seconds"

  - match: "airflow.scheduler.tasks.starving"
    name: "airflow_scheduler_tasks_starving"

  - match: "airflow.scheduler.tasks.running"
    name: "airflow_scheduler_tasks_running"

  - match: "airflow.dagrun.duration.success.*"
    name: "airflow_dagrun_duration_success_seconds"
    labels:
      dag_id: "$1"

  - match: "airflow.dagrun.duration.failed.*"
    name: "airflow_dagrun_duration_failed_seconds"
    labels:
      dag_id: "$1"

  - match: "airflow.dagrun.*.first_task_scheduling_delay"
    name: "airflow_dagrun_first_task_scheduling_delay_seconds"
    labels:
      dag_id: "$1"

  # --- Catch-all for unmapped metrics
  - match: "airflow.*"
    name: "airflow_$1"
